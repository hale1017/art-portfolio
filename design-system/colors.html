<!-- @dsCard group="色彩" name="核心色票" -->
<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  body{margin:0;padding:20px;font-family:"Noto Sans TC",sans-serif;background:#fdfdfd;color:#2e2e2c}
  .row{display:flex;flex-wrap:wrap;gap:12px}
  .sw{width:130px;border:1px solid #dcdbd6;border-radius:6px;overflow:hidden;font-size:12px}
  .sw .c{height:56px}.sw .t{padding:6px 8px;line-height:1.5}
  .t b{display:block}
</style></head><body>
<div class="row">
  <div class="sw"><div class="c" style="background:#fdfdfd;border-bottom:1px solid #eee"></div><div class="t"><b>--bg #fdfdfd</b>頁面底(近白)</div></div>
  <div class="sw"><div class="c" style="background:#f4f4f2"></div><div class="t"><b>--bg-alt #f4f4f2</b>區塊底</div></div>
  <div class="sw"><div class="c" style="background:#2e2e2c"></div><div class="t"><b>--ink #2e2e2c</b>主文字/頁尾底</div></div>
  <div class="sw"><div class="c" style="background:#77756f"></div><div class="t"><b>--ink-soft #77756f</b>次要文字</div></div>
  <div class="sw"><div class="c" style="background:#dcdbd6"></div><div class="t"><b>--line #dcdbd6</b>髮絲線/邊框</div></div>
  <div class="sw"><div class="c" style="background:#3a3936"></div><div class="t"><b>--accent #3a3936</b>石墨(選中態)</div></div>
  <div class="sw"><div class="c" style="background:#f2c94c"></div><div class="t"><b>--sticky #f2c94c</b>便利貼黃:全站唯一彩色,只給購買/報名 CTA</div></div>
  <div class="sw"><div class="c" style="background:#8a7a2a"></div><div class="t"><b>--gold #8a7a2a</b>獲獎 badge</div></div>
  <div class="sw"><div class="c" style="background:#6e7b64"></div><div class="t"><b>--green #6e7b64</b>經歷/動物系列</div></div>
  <div class="sw"><div class="c" style="background:#66707e"></div><div class="t"><b>--blue #66707e</b>學歷/職業系列</div></div>
  <div class="sw"><div class="c" style="background:#232321"></div><div class="t"><b>--stage-bg #232321</b>影片看板/lightbox 深色舞台</div></div>
  <div class="sw"><div class="c" style="background:#e8a0a0"></div><div class="t"><b>#e8a0a0</b>筆記本左紅邊線(裝飾)</div></div>
</div>
</body></html>
