<!-- @dsCard group="元件" name="按鈕/籤片/卡片/徽章/時間軸" -->
<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<link href="https://fontsapi.zeoseven.com/96/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Iansui&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:24px;font-family:"Noto Sans TC",sans-serif;background:#fdfdfd;color:#2e2e2c;line-height:1.7;font-size:15px}
  h4{font-family:"辰宇落雁體 Thin","Iansui",cursive;font-weight:400;font-size:1.6rem;margin:22px 0 10px}
  h4:first-child{margin-top:0}
  .btn{display:inline-flex;align-items:center;padding:10px 22px;border-radius:999px;border:1.5px solid #3a3936;background:transparent;color:#2e2e2c;margin-right:10px;cursor:pointer;font-size:.98rem}
  .btn-primary{background:#f2c94c;border-color:#f2c94c;box-shadow:0 2px 4px rgba(0,0,0,.12)}
  .chip{display:inline-block;padding:7px 18px;border:1.5px solid #9a988f;border-radius:255px 25px 225px 25px/25px 225px 25px 255px;background:#fff;color:#77756f;margin-right:8px;cursor:pointer}
  .chip.on{background:#3a3936;border-color:#3a3936;color:#fff}
  .card{width:220px;background:#fff;border:1px solid #dcdbd6;border-radius:6px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
  .card:hover{outline:1px solid #9a988f;outline-offset:3px}
  .card .thumb{aspect-ratio:4/3;background:#f4f4f2}
  .card .body{padding:12px 16px}
  .card .title{font-family:"辰宇落雁體 Thin","Iansui",cursive;font-size:1.4rem}
  .card .meta{font-size:.85rem;color:#77756f}
  .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.78rem;color:#fff;margin-right:6px}
  .tl{list-style:none;margin:0;padding:0}
  .tl li{position:relative;padding:0 0 18px 30px;border-left:1.5px solid #dcdbd6;margin-left:6px}
  .tl li::before{content:'';position:absolute;left:-7px;top:7px;width:11px;height:11px;border-radius:50%;background:#fdfdfd;border:2px solid #6b6963}
  .tl .y{font-family:"辰宇落雁體 Thin","Iansui",cursive;font-size:1.3rem;margin-right:10px}
  .scribble{width:100px;height:12px;background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 12'><path d='M3 7c16-3 34 2 50-1 14-2 28-2 44 0M9 10c20-4 44-5 62-2' stroke='%237a7873' stroke-width='2' fill='none' stroke-linecap='round'/></svg>") no-repeat left center/contain}
</style></head><body>
<h4>按鈕</h4>
<span class="btn btn-primary">我要訂購(便利貼黃 CTA)</span><span class="btn">次要按鈕</span>
<h4>籤片(手繪圈)</h4>
<span class="chip on">全部</span><span class="chip">水墨</span><span class="chip">水彩</span><span class="chip">電繪</span>
<h4>作品卡</h4>
<div class="card"><div class="thumb"></div><div class="body"><div class="title">山嵐</div><div class="meta">水墨・2026</div></div></div>
<h4>徽章</h4>
<span class="badge" style="background:#66707e">職業系列</span><span class="badge" style="background:#6e7b64">動物系列</span><span class="badge" style="background:#8a7a2a">獲獎</span><span class="badge" style="background:#3a3936">展覽</span>
<h4>區塊標題底線(鉛筆亂線)</h4>
<div class="scribble"></div>
<h4>時間軸</h4>
<ul class="tl"><li><span class="y">2026</span>個展《紙與布》</li><li><span class="y">2025</span>全國手作創作獎 入選</li></ul>
</body></html>
