<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<link href="https://fontsapi.zeoseven.com/96/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Iansui&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:"Noto Sans TC",sans-serif;color:#2e2e2c}
  .hero{padding:48px 40px;background:
    linear-gradient(90deg,transparent 63px,#e8a0a0 63px,#e8a0a0 64.5px,transparent 64.5px),
    repeating-linear-gradient(#fdfdfd 0 31px,#e4e8ee 31px 32px)}
  .tag{display:inline-block;background:linear-gradient(transparent 55%,#f9e48f 55%,#f9e48f 92%,transparent 92%);letter-spacing:.14em;font-size:1.02rem}
  h1{font-family:"辰宇落雁體 Thin","Iansui",cursive;font-weight:400;font-synthesis:none;font-size:3.4rem;margin:8px 0 10px;line-height:1.3}
  p{color:#77756f;margin:0 0 22px}
  .cta{display:inline-block;padding:11px 24px;border-radius:999px;background:#f2c94c;color:#2e2e2c;text-decoration:none;box-shadow:0 2px 4px rgba(0,0,0,.12);font-size:.98rem}
  .header{display:flex;justify-content:space-between;align-items:center;padding:12px 40px;border-bottom:1.5px solid #dcdbd6;background:rgba(253,253,253,.92)}
  .brand{font-family:"辰宇落雁體 Thin","Iansui",cursive;font-size:1.75rem}
  .brand i{display:inline-block;width:12px;height:12px;background:#f2c94c;border-radius:1px;transform:rotate(-6deg);box-shadow:0 1px 1px rgba(0,0,0,.15)}
  .nav{display:flex;gap:4px;font-size:.95rem}
  .nav span{padding:8px 14px;border-radius:999px;color:#77756f}
  .nav .on{background:#3a3936;color:#fff}
</style></head><body>
<div class="header">
  <span class="brand">肚紙老師工作室<i></i></span>
  <span class="nav"><span class="on">首頁</span><span>作品集</span><span>娃衣與材料包</span><span>教學課程</span><span>關於我</span></span>
</div>
<div class="hero">
  <span class="tag">繪畫・娃衣・手作材料包</span>
  <h1>肚紙老師工作室</h1>
  <p>在紙與布之間,尋找手的溫度。</p>
  <a class="cta" href="#">看看我的作品</a>
</div>
</body></html>
