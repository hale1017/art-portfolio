# 藝術家從後台上傳圖片(push 到 main)後,自動壓縮原圖並產生縮圖。
# 機器人的 commit 用 GITHUB_TOKEN push,不會再觸發 workflow(GitHub 預設),不會無限循環。
name: 圖片自動壓縮與縮圖

on:
  push:
    branches: [main]
    paths:
      - "images/uploads/**"
  workflow_dispatch: {}   # 需要時可手動跑一輪

permissions:
  contents: write

jobs:
  process-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝 Pillow
        run: pip install pillow

      - name: 壓縮原圖 + 產生縮圖
        run: python tools/process_images.py

      - name: 有變動就 commit 回 main
        run: |
          git config user.name "image-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A images
          if git diff --cached --quiet; then
            echo "沒有需要提交的變動"
          else
            git commit -m "自動:壓縮上傳圖片並產生縮圖"
            git pull --rebase origin main
            git push
          fi
