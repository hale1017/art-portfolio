<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>娃衣與材料包|肚紙老師工作室</title>
  <meta name="description" content="棉花娃娃娃衣作品:職業系列與動物系列,以及可訂購的手作材料包。">
  <meta property="og:title" content="娃衣與材料包|肚紙老師工作室">
  <meta property="og:image" content="/images/site/og-default.svg">
  <meta name="theme-color" content="#faf6f0">
  <link rel="icon" href="images/site/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/billboard.css">
  <script src="/js/theme-preview.js"></script>
</head>
<body>
  <site-header></site-header>

  <main class="container">
    <div class="page-head">
      <h1>娃衣作品</h1>
      <p class="lede">每一件娃衣都是手工縫製。點開可以看更多角度的照片。</p>
    </div>

    <div class="chips" id="series-chips" role="group" aria-label="系列篩選"></div>
    <div class="card-grid" id="dolls-grid"></div>
    <div class="empty-note" id="dolls-empty" hidden>這個系列目前還沒有作品。</div>

    <section class="section" id="kit-section" hidden>
      <div class="section-head">
        <h2>材料包訂購</h2>
      </div>
      <p class="kit-intro" id="kit-intro"></p>
      <div id="kit-billboard"></div>
    </section>
  </main>

  <dialog class="lightbox" id="lightbox" aria-label="娃衣照片">
    <div class="lightbox-figure">
      <button class="lightbox-close" aria-label="關閉">✕</button>
      <button class="lightbox-nav prev" aria-label="上一張">‹</button>
      <img id="lightbox-img" alt="">
      <button class="lightbox-nav next" aria-label="下一張">›</button>
      <span class="lightbox-counter" id="lightbox-counter"></span>
    </div>
    <div class="lightbox-caption">
      <h3 id="lightbox-title"></h3>
      <div class="meta" id="lightbox-meta"></div>
      <p id="lightbox-desc"></p>
    </div>
  </dialog>

  <site-footer></site-footer>

  <script type="module" src="js/include.js"></script>
  <script type="module" src="js/dolls.js"></script>
</body>
</html>
